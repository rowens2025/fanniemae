name: mortgage_analytics
version: 1.0.0
config-version: 2

profile: mortgage_analytics

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  mortgage_analytics:
    +persist_docs:
      relation: true
      columns: true

    staging:
      +schema: stg_mortgage
      +materialized: view

    intermediate:
      +schema: int_mortgage
      +materialized: table

    marts:
      +schema: mart_mortgage
      +materialized: table
