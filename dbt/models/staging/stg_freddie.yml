version: 2

models:
  - name: stg_freddie_origination
    description: Cleaned and typed staging view over raw Freddie origination rows.
    columns:
      - name: loan_id
        description: Freddie loan sequence number.
        tests:
          - not_null
          - unique
      - name: source_year
        tests:
          - not_null
      - name: source_quarter
        tests:
          - not_null

  - name: stg_freddie_monthly_performance
    description: Cleaned and typed staging view over raw Freddie monthly performance rows.
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - loan_id
              - reporting_month
    columns:
      - name: loan_id
        tests:
          - not_null
      - name: reporting_month
        tests:
          - not_null
      - name: source_year
        tests:
          - not_null
      - name: source_quarter
        tests:
          - not_null
